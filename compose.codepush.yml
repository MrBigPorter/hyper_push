# ==========================================
# CodePush Server — Docker Compose (for HyperPush)
# ==========================================
# code-push-server: lisong/code-push-server v5.7.1 (MIT)
#   GitHub: https://github.com/lisong/code-push-server
#
# 使用方法:
#   docker compose -f compose.codepush.yml up -d
#   docker compose -f compose.codepush.yml down
#   docker compose -f compose.codepush.yml logs -f
#
# 与 HyperPush BFF 配合:
#   HyperPush 的 NestJS BFF 作为管理控制台，
#   通过 HTTP 代理连接到 code-push-server 进行 App/Deployment/Release 管理。
#
# 存储: 本地文件系统 (STORAGE_TYPE=local)
#   更新包 (.zip) 存储在 codepush-storage volume
#
# 内存预算 (8GB 服务器):
#   OS + Docker:      ~500 MB
#   HyperPush BFF:    ~256 MB
#   MySQL 8.0:        ~256-512 MB
#   code-push-server: ~80-128 MB
#   Redis:            ~16-32 MB
#   Swap 兜底:         2 GB
#   总计:              ~1.2 GB 容器 + 2 GB swap
# ==========================================

services:
  # =========================================
  # MySQL 8.0 — code-push-server 的数据库
  # code-push-server 强制使用 MySQL，不支持 PostgreSQL
  # =========================================
  codepush-mysql:
    image: mysql:8.0
    container_name: hyperpush-codepush-mysql
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    volumes:
      - codepush-mysql-data:/var/lib/mysql
    environment:
      # CRITICAL: code-push-server-db init CLI 和 code-push-server 运行时
      # 均不支持密码认证 (无 --password 选项 / 无 RDS_PASSWORD 环境变量)
      # 此 MySQL 仅暴露在内部 Docker 网络 (无 host 端口映射)，安全风险可控
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: codepush
    # CRITICAL: MySQL 8.0 默认使用 caching_sha2_password 认证插件，
    # 但 code-push-server 使用的旧版 Sequelize v4.44.4 + mysql2 驱动
    # 不支持此协议。必须降级为 mysql_native_password 才能正常连接。
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root --silent || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    expose:
      - "3306"
    networks: [codepush]

  # =========================================
  # Redis 7-alpine — 可选，用于登录频率限制
  # 不配置 Redis 也能正常运行
  # =========================================
  codepush-redis:
    image: redis:7-alpine
    container_name: hyperpush-codepush-redis
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 32M
        reservations:
          memory: 16M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    expose:
      - "6379"
    networks: [codepush]

  # =========================================
  # CodePush Server
  # 使用 lisong/code-push-server npm 包 (v5.7.1)
  # - MySQL 驱动 (mysql2)
  # - 本地文件系统存储 (STORAGE_TYPE=local)
  # - JWT 认证
  # =========================================
  codepush:
    image: node:18-alpine
    container_name: hyperpush-codepush-prod
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    mem_limit: 1G
    mem_reservation: 80M
    command: >
      sh -c "
        echo '>>> Installing code-push-server...' &&
        rm -rf /usr/local/lib/node_modules/code-push-server /usr/local/lib/node_modules/.code-push-server-* &&
        npm install -g code-push-server@5.7.1 &&

        echo '>>> Patching upstream TTL bug (ttl/1000 → ttl days)...' &&
        sed -i \"s/moment().add(ttl\\/1000, 'seconds')/moment().add(ttl, 'days')/\" /usr/local/lib/node_modules/code-push-server/core/services/account-manager.js &&

        echo '>>> Patching upstream metrics NULL bug (init active/downloaded/failed/installed to 0)...' &&
        sed -i \"s/{package_id: packages.id}/{package_id: packages.id, active: 0, downloaded: 0, failed: 0, installed: 0}/\" /usr/local/lib/node_modules/code-push-server/core/services/package-manager.js &&

        echo '>>> Patching upstream listDeloyment await bug (missing .then on Promise in GET /deployments/:name)...' &&
        sed -i \"s|res.send({deployment: deployments.listDeloyment(deploymentInfo)});|return deployments.listDeloyment(deploymentInfo).then((data) => { res.send({deployment: data}); });|\" /usr/local/lib/node_modules/code-push-server/routes/apps.js &&

        echo '>>> Waiting for MySQL to be ready...' &&
        mysql_ready=false &&
        for i in \$$(seq 1 30); do
          if node -e \"require('net').createConnection({host:'codepush-mysql',port:3306},function(){process.exit(0)}).on('error',function(){process.exit(1)})\" 2>/dev/null; then
            echo '  MySQL is ready!'
            mysql_ready=true
            break
          fi
          echo \"  attempt \$$i/30...\"
          sleep 2
        done &&
        if [ \"\$$mysql_ready\" = false ]; then
          echo '  All 30 attempts failed, exiting.'
          exit 1
        fi &&

        echo '>>> Initializing database schema...' &&
        code-push-server-db init --dbhost codepush-mysql --dbuser root --dbport 3306 --force &&

        echo '>>> Using stable TOKEN_SECRET from environment...' &&

        echo '>>> Starting code-push-server on port 3000...' &&
        code-push-server
      "
    environment:
      # ── MySQL 连接 (config/config.js: RDS_*) ──
      - RDS_HOST=codepush-mysql
      - RDS_PORT=3306
      - RDS_USERNAME=root
      - DATA_BASE=codepush

      # ── 本地文件存储 ──
      - STORAGE_TYPE=local
      - STORAGE_DIR=/data/storage
      # ★ 公网下载地址 — Lucky nginx 将 cp.hyperpush.org/codepush/ 代理到本服务 (host:3003)
      - LOCAL_DOWNLOAD_URL=https://cp.hyperpush.org/codepush/download
      - DATA_DIR=/data/tmp

      # ── JWT 签名密钥 (固定值，避免容器重启后所有 JWT 令牌失效) ──
      - TOKEN_SECRET=HpcpServer2024TokenSecretKeyForJwtSigningDoNotChange

      # ── 服务器配置 ──
      - PORT=3000
      - NODE_ENV=production

      # ── Redis (可选) ──
      - REDIS_HOST=codepush-redis
      - REDIS_PORT=6379
    healthcheck:
      # TCP 端口探测：不依赖 HTTP 路由，只检查 3000 端口是否在监听
      test: ["CMD-SHELL", "node -e \"require('net').createConnection({port:3000,host:'localhost'},()=>process.exit(0)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s
    volumes:
      - codepush-storage:/data/storage
      - codepush-tmp:/data/tmp
    depends_on:
      codepush-mysql:
        condition: service_healthy
      codepush-redis:
        condition: service_healthy
    # 暴露到 host 的 3003 端口，避免与 JoyMini 项目端口冲突
    ports:
      - "3003:3000"
    networks: [codepush]

networks:
  codepush:
    driver: bridge

volumes:
  codepush-mysql-data:
  codepush-storage:
  codepush-tmp:
