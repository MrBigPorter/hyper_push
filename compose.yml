# ==========================================
# HyperPush — Production Docker Compose (Base)
# ==========================================
# 生产环境使用:
#   docker compose -f compose.yml -f deploy/compose.prod.yml up -d
#
# 开发环境使用:
#   docker compose -f compose.yml -f compose.dev.yml up -d --build
# ==========================================
# 架构说明:
#   - HyperPush BFF: NestJS + Prisma + GraphQL (port 3000 → host 3002)
#   - PostgreSQL 16 (HyperPush 数据库)
#   - code-push-server (port 3000 → host 3003)
#   - MySQL 8.0 (CodePush 数据库)
#   - Redis 7 (CodePush 缓存)
# ==========================================
# 域名架构:
#   - 前台: https://hyperpush.org/              (Cloudflare Pages / VPS)
#   - API:  https://cp.hyperpush.org/graphql    (Lucky Nginx → BFF :3002)
#   - CodePush: https://cp.hyperpush.org/       (Lucky Nginx → CodePush :3003)
# ==========================================

include:
  - compose.codepush.yml

services:
  # =========================================
  # PostgreSQL 数据库
  # =========================================
  db:
    image: postgres:16-alpine
    container_name: hyperpush-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: hyperpush
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hyperpush123}
      POSTGRES_DB: hyperpush
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hyperpush"]
      interval: 5s
      timeout: 5s
      retries: 5

  # =========================================
  # HyperPush 后端 (NestJS + Prisma + GraphQL)
  # =========================================
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    image: hyperpush:latest
    container_name: hyperpush-app
    restart: unless-stopped
    ports:
      - "3002:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://hyperpush:${POSTGRES_PASSWORD:-hyperpush123}@db:5432/hyperpush
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --post-data='{\"query\":\"{_health}\"}' --header='Content-Type: application/json' http://localhost:3000/graphql >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 30s
    networks:
      - default
      - codepush

volumes:
  prisma_client:
  pgdata:
