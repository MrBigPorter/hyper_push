# ==========================================
# HyperPush — Production Docker Compose
# ==========================================
# 生产环境使用:
#   docker compose up -d --build
#
# 开发环境使用:
#   docker compose -f compose.yml -f compose.dev.yml up -d --build
# ==========================================
# 架构说明:
#   - HyperPush BFF: NestJS + Prisma + GraphQL (port 3000)
#   - Frontend:      Vite + React (port 5173)
#   - PostgreSQL 16 (HyperPush 数据库)
#   - code-push-server (port 3001)
#   - MySQL 8.0 (CodePush 数据库)
#   - Redis 7 (CodePush 缓存)
# ==========================================

include:
  - compose.codepush.yml

services:
  # =========================================
  # PostgreSQL 数据库
  # =========================================
  db:
    image: postgres:16-alpine
    container_name: hyperpush-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: hyperpush
      POSTGRES_PASSWORD: hyperpush123
      POSTGRES_DB: hyperpush
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hyperpush"]
      interval: 5s
      timeout: 5s
      retries: 5

  # =========================================
  # HyperPush 后端 (NestJS + Prisma + GraphQL)
  # =========================================
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    image: hyperpush:latest
    container_name: hyperpush-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://hyperpush:hyperpush123@db:5432/hyperpush}
      NODE_ENV: development
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
      - ./backend/package.json:/app/package.json
      - prisma_client:/app/node_modules/.prisma
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --post-data='{\"query\":\"{_health}\"}' --header='Content-Type: application/json' http://localhost:3000/graphql >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 30s

  # =========================================
  # HyperPush 前端 (Vite + React + HMR)
  # =========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: hyperpush-frontend:latest
    container_name: hyperpush-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_PROXY_TARGET: http://app:3000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/package.json:/app/package.json
    depends_on:
      app:
        condition: service_healthy

volumes:
  prisma_client:
  pgdata:
