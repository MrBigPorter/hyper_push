# ==========================================
# HyperPush — Development Docker Compose
# ==========================================
# 一键启动 (所有服务):
#   docker compose up -d --build
#
# 查看日志:
#   docker compose logs -f
#
# 停止:
#   docker compose down
# ==========================================
# 架构说明:
#   - HyperPush BFF: NestJS + Prisma + GraphQL (port 3000)
#   - Frontend:      Vite + React (port 5173)
#   - code-push-server (port 3001)
#   - MySQL 8.0 (CodePush 数据库)
#   - Redis 7 (CodePush 缓存)
#   - 本地开发用 SQLite，无需 PostgreSQL
# ==========================================

include:
  - compose.codepush.yml

services:
  # =========================================
  # HyperPush 后端 (NestJS + Prisma + GraphQL)
  # =========================================
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    image: hyperpush:latest
    container_name: hyperpush-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-file:./dev.db}
      NODE_ENV: development
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
      - ./backend/package.json:/app/package.json
      - prisma_client:/app/node_modules/.prisma
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --post-data='{\"query\":\"{_health}\"}' --header='Content-Type: application/json' http://localhost:3000/graphql >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 20s

  # =========================================
  # HyperPush 前端 (Vite + React + HMR)
  # =========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: hyperpush-frontend:latest
    container_name: hyperpush-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_PROXY_TARGET: http://app:3000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/package.json:/app/package.json
    depends_on:
      app:
        condition: service_healthy

volumes:
  prisma_client:
