# ==========================================
# HyperPush — 🖥️ VPS Deployment (Docker Compose)
# ==========================================
# 推送到 main 分支时自动触发 / 也可由 master orchestrator 调用
#
# 参考 JoyMini deploy-backend.yml 模式:
#   阶段 0: 代码质量检查 (门禁)
#   阶段 1: 构建 Docker 镜像 → 推送到 GHCR
#   阶段 2: SSH 部署到 VPS (拉取镜像 + 迁移 + 重启 + 健康检查 + 回滚)
#   阶段 3: 外部验证 + Telegram 通知
# ==========================================

name: Deploy VPS

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "compose.yml"
      - "compose.codepush.yml"
      - "deploy/compose.prod.yml"
      - "frontend/Dockerfile"
      - "backend/Dockerfile"
      - ".github/workflows/deploy-vps.yml"
  workflow_dispatch:
    inputs:
      runner:
        description: "🖥️ Runner"
        type: choice
        options: [ubuntu-latest, self-hosted]
        default: ubuntu-latest
  workflow_call:
    inputs:
      runner:
        description: "Runner to use"
        type: string
        default: ubuntu-latest

concurrency:
  group: deploy-vps
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_APP: ghcr.io/${{ github.repository_owner }}/hyperpush-app

jobs:
  # =========================================
  # 阶段 0: 代码质量检查 (硬门禁)
  # =========================================
  quality:
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y python3 make g++ openssl

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Generate Prisma Client
        working-directory: backend
        run: npx prisma generate

      - name: Check DI imports (hard gate)
        working-directory: backend
        run: npm run check:imports

      - name: Validate DI graph (hard gate)
        working-directory: backend
        env:
          JWT_SECRET: dummy-validate-di-secret
          TOTP_ENCRYPTION_KEY: dummy-validate-di-totp-key
        run: bun scripts/validate-di.mts

      - name: Lint backend
        working-directory: backend
        run: npx tsc --noEmit 2>&1 || true
        continue-on-error: true

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Lint frontend
        working-directory: frontend
        run: npx tsc --noEmit 2>&1 || true
        continue-on-error: true

  # =========================================
  # 阶段 1a: 构建后端 Docker 镜像 → 推送到 GHCR
  # =========================================
  build:
    needs: quality
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta (backend)
        id: meta-app
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME_APP }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta-app.outputs.tags }}
          labels: ${{ steps.meta-app.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =========================================
  # 阶段 1b: 部署前端到 Cloudflare Pages
  # =========================================
  deploy-frontend:
    needs: quality
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build:only
        env:
          VITE_API_URL: ${{ vars.API_URL || 'https://cp.hyperpush.org/graphql' }}
          VITE_RECAPTCHA_SITE_KEY: ${{ secrets.RECAPTCHA_SITE_KEY }}
          VITE_MONITOR_URL: https://monitor.joyminins.com

      - name: Create Cloudflare Pages project if not exists
        working-directory: frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler pages project create hyperpush --production-branch main 2>/dev/null || echo "Project already exists, continuing..."

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/app --project-name=hyperpush
          workingDirectory: frontend
          packageManager: npm

  # =========================================
  # 阶段 2: SSH 部署到 VPS
  # =========================================
  deploy:
    needs: [build, deploy-frontend]
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---- 预检 SSH 连通性 ----
      - name: Validate SSH connectivity preflight
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
        run: |
          set -euo pipefail
          HOST="${SSH_HOST:-}"
          PORT="${SSH_PORT:-22}"
          if [ -z "$HOST" ]; then
            echo "::error::SSH_HOST is empty. Set repository/environment secret SSH_HOST."
            exit 1
          fi
          echo "Preflight: probing ${HOST}:${PORT}..."
          for i in 1 2 3; do
            if nc -zvw5 "$HOST" "$PORT"; then
              echo " SSH reachable on attempt #$i"
              break
            fi
            echo "⚠️ Attempt #$i failed, retry in 5s..."
            sleep 5
          done

      # ---- SSH 密钥配置 ----
      - name: Setup SSH key & known_hosts
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
        run: |
          set -euo pipefail

          # Validate SSH_KEY is set
          if [ -z "$SSH_KEY" ]; then
            echo "::error::SSH_PRIVATE_KEY secret is empty or not set."
            echo "Please configure SSH_PRIVATE_KEY in repository secrets (Settings → Secrets and variables → Actions)."
            echo ""
            echo "Generate a key pair on your VPS if needed:"
            echo "  ssh-keygen -t ed25519 -a 100 -f ~/.ssh/hyperpush-deploy -N ''"
            echo "  cat ~/.ssh/hyperpush-deploy.pub >> ~/.ssh/authorized_keys"
            echo "Then copy the PRIVATE key content into GitHub secret SSH_PRIVATE_KEY."
            exit 1
          fi

          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"

          # Write key to file (preserves newlines from secret)
          echo "Writing SSH key to $HOME/.ssh/hyperpush-deploy..."
          echo "$SSH_KEY" > "$HOME/.ssh/hyperpush-deploy"
          chmod 600 "$HOME/.ssh/hyperpush-deploy"

          # Validate key looks like a valid private key
          if ! head -1 "$HOME/.ssh/hyperpush-deploy" | grep -qE '^-----BEGIN (OPENSSH|RSA|EC|DSA) PRIVATE KEY-----'; then
            echo "::warning::SSH_PRIVATE_KEY does not start with a valid private key header. Check the format."
          fi

          # Add host key to known_hosts to avoid host key verification prompts
          echo "Adding $SSH_HOST:$SSH_PORT to known_hosts..."
          ssh-keyscan -T 10 -p "$SSH_PORT" "$SSH_HOST" 2>/dev/null >> "$HOME/.ssh/known_hosts" || \
            echo "::warning::ssh-keyscan failed for $SSH_HOST:$SSH_PORT (DNS resolution or connectivity issue)"

          echo "::add-mask::$SSH_KEY"
          echo "✅ SSH key written to $HOME/.ssh/hyperpush-deploy"

      # ---- SSH 认证预检 ----
      - name: 🔐 Verify SSH authentication
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USERNAME }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
        run: |
          set -euo pipefail
          echo "Testing SSH authentication to ${SSH_USER}@${SSH_HOST}:${SSH_PORT}..."
          
          OUTPUT=$(ssh -o StrictHostKeyChecking=accept-new \
            -o BatchMode=yes \
            -o ConnectTimeout=10 \
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            -i "$HOME/.ssh/hyperpush-deploy" \
            -p "$SSH_PORT" \
            "${SSH_USER}@${SSH_HOST}" \
            "echo 'SSH_AUTH_OK'" 2>&1) || {
            EXIT_CODE=$?
            echo "::error::SSH authentication FAILED (exit code: ${EXIT_CODE})"
            echo ""
            echo "=== DEBUGGING TIPS ==="
            echo "1️⃣  Check that the public key is installed on the VPS:"
            echo "     ssh-copy-id -i ~/.ssh/hyperpush-deploy.pub ${SSH_USER}@${SSH_HOST}"
            echo ""
            echo "2️⃣  Verify the SSH_PRIVATE_KEY secret contains the full private key"
            echo "    including the BEGIN/END lines, with proper line breaks."
            echo ""
            echo "3️⃣  Check SSH server config on VPS (/etc/ssh/sshd_config):"
            echo "     PubkeyAuthentication yes"
            echo "     AuthorizedKeysFile .ssh/authorized_keys"
            echo ""
            echo "4️⃣  Test manually from local machine:"
            echo "     ssh -i keyfile -p ${SSH_PORT} ${SSH_USER}@${SSH_HOST}"
            echo ""
            echo "=== SSH OUTPUT ==="
            echo "$OUTPUT"
            exit 1
          }
          echo "✅ SSH authentication successful: ${OUTPUT}"

      # ---- 远程目录初始化 ----
      - name: 📁 Ensure remote target directory exists
        env:
          SSH_USER: ${{ secrets.SSH_USERNAME }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
        run: |
          set -euo pipefail
          echo "Ensuring remote directory /opt/hyperpush/deploy exists..."
          ssh -o StrictHostKeyChecking=accept-new \
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            -i "$HOME/.ssh/hyperpush-deploy" \
            -p "$SSH_PORT" \
            "${SSH_USER}@${SSH_HOST}" \
            "set -e && \
             mkdir -p /opt/hyperpush/deploy && \
             echo '✅ Target directory ready:' && \
             ls -ld /opt/hyperpush /opt/hyperpush/deploy"
          echo "✅ Remote directory verified"

      # ---- SCP: 同步 compose 和 deploy 文件到 VPS ----
      - name: 📦 Sync Compose & Deploy files to VPS (SCP)
        env:
          SSH_USER: ${{ secrets.SSH_USERNAME }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
        run: |
          set -euo pipefail

          # Create a tar archive of all source files
          echo "Creating archive of: compose.yml compose.codepush.yml deploy/compose.prod.yml deploy/scripts/"
          tar czf /tmp/hyperpush-deploy.tar.gz \
            compose.yml \
            compose.codepush.yml \
            deploy/compose.prod.yml \
            deploy/scripts/

          echo "Archive size: $(du -h /tmp/hyperpush-deploy.tar.gz | cut -f1)"

          # SCP the archive to VPS (using native scp with explicit key)
          echo "SCP archive to ${SSH_USER}@${SSH_HOST}:/tmp/..."
          scp -o StrictHostKeyChecking=accept-new \
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            -i "$HOME/.ssh/hyperpush-deploy" \
            -P "$SSH_PORT" \
            -C \
            /tmp/hyperpush-deploy.tar.gz \
            "${SSH_USER}@${SSH_HOST}:/tmp/hyperpush-deploy.tar.gz"
          echo "✅ Archive transferred successfully"

          # Extract archive on remote server
          echo "Extracting archive on remote server..."
          ssh -o StrictHostKeyChecking=accept-new \
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            -i "$HOME/.ssh/hyperpush-deploy" \
            -p "$SSH_PORT" \
            "${SSH_USER}@${SSH_HOST}" \
            "set -e && \
             cd /opt/hyperpush && \
             tar xzf /tmp/hyperpush-deploy.tar.gz && \
             rm -f /tmp/hyperpush-deploy.tar.gz && \
             echo '--- Files deployed ---' && \
             ls -la compose.yml compose.codepush.yml deploy/ && \
             echo '✅ Files extracted successfully'"

          # Clean up local archive
          rm -f /tmp/hyperpush-deploy.tar.gz
          echo "✅ Local archive cleaned up"

      # ---- 计算小写镜像名 (Docker 强制要求小写) ----
      - name: Set lowercase image names (Docker requirement)
        run: |
          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
          echo "IMAGE_APP_LC=ghcr.io/${OWNER_LC}/hyperpush-app:latest" >> "$GITHUB_ENV"

      # ---- SSH: 部署到 VPS ----
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.repository_owner }}
          IMAGE_APP: ${{ env.IMAGE_APP_LC }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          timeout: 120s
          command_timeout: 30m
          envs: GHCR_TOKEN,GHCR_USER,IMAGE_APP
          script: |
            set -e
            cd /opt/hyperpush

            retry() {
              local max="$1" delay="$2"; shift 2
              local n=1
              while true; do
                if "$@"; then return 0; fi
                if [ "$n" -ge "$max" ]; then
                  echo "❌ Failed after ${n} attempts: $*"; return 1
                fi
                echo "⚠️ attempt ${n} failed, retry in ${delay}s..."
                n=$((n+1)); sleep "$delay"
              done
            }

            echo "========================================"
            echo " 1/8 — Preflight GitHub connectivity..."
            echo "========================================"
            retry 4 5 curl -fsS --max-time 15 https://github.com >/dev/null

            echo "========================================"
            echo " 2/8 — Login GHCR..."
            echo "========================================"
            retry 4 8 sh -c 'echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin'

            echo "========================================"
            echo " 3/8 — Write .env file..."
            echo "========================================"
            cat > .env << 'ENVEOF'
            CODEPUSH_DOMAIN=${{ secrets.CODEPUSH_DOMAIN }}
            CONSOLE_DOMAIN=${{ secrets.CONSOLE_DOMAIN }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            TOKEN_SECRET=${{ secrets.TOKEN_SECRET }}
            TOTP_ENCRYPTION_KEY=${{ secrets.TOTP_ENCRYPTION_KEY }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
            PUBLIC_URL=https://${{ secrets.CODEPUSH_DOMAIN }}
            CORS_ORIGINS=https://hyperpush.org
            RECAPTCHA_SECRET_KEY=${{ secrets.RECAPTCHA_SECRET_KEY }}
            RECAPTCHA_ENABLED=true
            GRAFANA_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD }}
            GRAFANA_AUTH_SECRET=${{ secrets.GRAFANA_AUTH_SECRET }}
            LOG_LEVEL=info
            ENVEOF

            echo "========================================"
            echo " 4/7 — Pull latest image..."
            echo "========================================"
            retry 4 10 docker pull "$IMAGE_APP"

            # Retag GHCR image to match compose.yml image name
            docker tag "$IMAGE_APP" hyperpush:latest

            echo "========================================"
            echo " 5/7 — Sync DB schema (prisma db push)..."
            echo "========================================"
            NETWORK=$(docker inspect hyperpush-db \
              --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}}{{end}}' \
              | awk '{print $1}')
            docker run --rm \
              --network "$NETWORK" \
              --env-file .env \
              --entrypoint "" \
              "$IMAGE_APP" \
              npx prisma db push 2>&1 || echo "⚠️ Schema sync may have already been applied"

            echo "========================================"
            echo " 6/7 — Stop old containers & restart..."
            echo "========================================"
            # Only stop HyperPush's own containers — don't touch other projects!
            echo "➡️  Stopping HyperPush containers (if any)..."
            docker compose -f compose.yml -f deploy/compose.prod.yml down 2>/dev/null || true
            echo "➡️  Starting HyperPush containers..."
            docker compose -f compose.yml -f deploy/compose.prod.yml up -d

            echo "========================================"
            echo " 7/7 — Health check (max 90s)..."
            echo "========================================"
            HEALTHY=false
            for i in $(seq 1 30); do
              if docker exec hyperpush-app wget -qO- \
                --post-data='{"query":"{_health}"}' \
                --header='Content-Type: application/json' \
                http://localhost:3000/graphql >/dev/null 2>&1; then
                echo " ✅ Health check passed (attempt $i, ~$((i*3))s)"
                HEALTHY=true
                break
              fi
              echo " Attempt $i/30..."
              sleep 3
            done

            if [ "$HEALTHY" = false ]; then
              echo "❌ Health check timeout! Check logs:"
              docker logs --tail=30 hyperpush-app
              exit 1
            fi

            # Cleanup old images
            docker image prune -f

            echo ""
            echo "✅ VPS Deployment complete!"
            docker compose -f compose.yml -f deploy/compose.prod.yml ps

      # ---- 外部验证 ----
      # ★ 注意: hyperpush.org 走的是 Cloudflare Pages，CI 验证时不走公网域名
      #   改为直连 VPS IP:80 (Lucky Nginx)，绕过 Cloudflare
      - name: 🔍 Verify API externally (via VPS directly)
        id: verify
        continue-on-error: true
        timeout-minutes: 3
        env:
          VPS_URL: http://${{ secrets.SERVER_IP }}
        run: |
          set -euo pipefail
          echo "→ Verifying from GitHub runner (direct to VPS)..."
          echo "  Target: $VPS_URL/graphql"
          echo ""

          # GraphQL health with retry
          echo "⏳ Checking GraphQL health endpoint..."
          HEALTHY=false
          for i in $(seq 1 6); do
            RESP=$(curl -sS --max-time 10 \
              --post-data '{"query":"{_health}"}' \
              --header 'Content-Type: application/json' \
              --header 'Host: hyperpush.org' \
              "$VPS_URL/graphql" 2>&1) && {
              echo " ✅ GraphQL health: $(echo "$RESP" | head -c 200)"
              HEALTHY=true
              break
            } || {
              echo " Attempt $i/6 — not ready yet..."
              sleep 10
            }
          done

          if [ "$HEALTHY" = true ]; then
            echo "✅ External verification PASSED"
          else
            echo "⚠️ GraphQL endpoint unreachable after 6 attempts"
            echo "  Check: docker exec hyperpush-app wget -qO- http://localhost:3000/graphql ..."
            exit 1
          fi

      - name: ⚠️ External verification result (non-fatal)
        if: steps.verify.outcome == 'failure'
        run: |
          echo "::warning::━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "::warning:: Post-deploy verification failed."
          echo "::warning:: Try SSH:"
          echo "::warning::   ssh root@${{ secrets.SERVER_IP }} 'docker exec hyperpush-app wget -qO- http://localhost:3000/graphql --post-data=\"{query:{_health}}\" --header=Content-Type:application/json'"
          echo "::warning::"
          echo "::warning:: Public URL (via Cloudflare Pages) may take a few minutes to propagate."
          echo "::warning:: Test manually: curl -X POST https://hyperpush.org/graphql -H 'Content-Type: application/json' -d '{\"query\":\"{_health}\"}'"
          echo "::warning::━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  CNAME (Frontend): hyperpush.pages.dev → Cloudflare Pages (or custom domain)"
