# ==========================================
# HyperPush — Nginx Reverse Proxy Config
# ==========================================
# 使用方法:
#   上传到 VPS 后挂载到 Nginx 容器:
#     /etc/nginx/conf.d/default.conf
# ==========================================
# 域名说明:
#   CONSOLE_DOMAIN  — 管理后台 (GraphQL API + 前端静态文件)
#   CODEPUSH_DOMAIN — CodePush 服务端
# ==========================================

# Gzip 压缩
gzip on;
gzip_min_length 1k;
gzip_comp_level 5;
gzip_vary on;
gzip_proxied any;
gzip_types
    application/json
    application/javascript
    application/xml
    text/plain
    text/css
    text/javascript;

# Docker DNS 解析器（运行时动态解析容器名，防止重建后 502）
resolver 127.0.0.11 valid=10s ipv6=off;

# ==========================================
# Console Domain — HyperPush API (前端已迁移到 Cloudflare Pages)
# ==========================================
server {
    listen 80;
    server_name console.hyperpush.org;

    access_log /dev/stdout combined;
    error_log  /dev/stderr warn;

    client_max_body_size 100M;

    # ---- 安全头 ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Access-Control-Allow-Origin "https://app.hyperpush.org" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
    add_header Access-Control-Allow-Credentials "true" always;

    # ---- GraphQL API (NestJS BFF) ----
    location /graphql {
        proxy_pass http://hyperpush-app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ---- API 路由 ----
    location /api/ {
        proxy_pass http://hyperpush-app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ==========================================
# CodePush Domain — CodePush Server
# ==========================================
server {
    listen 80;
    server_name cp.hyperpush.org;

    access_log /dev/stdout combined;
    error_log  /dev/stderr warn;

    # 大文件上传 (release 包)
    client_max_body_size 500M;

    # ---- 安全头 ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---- CodePush 代理 ----
    location / {
        proxy_pass http://hyperpush-codepush-prod:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # download 路径需要更长的超时
    location /download {
        proxy_pass http://hyperpush-codepush-prod:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
